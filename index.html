<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Studio Pro — Infinity Edition</title>
    <meta name="description" content="The world's most stunning, premium QR code designer.">
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>

    <style>
        /* ─── Infinity Design System ───────────────────────────────────── */
        :root {
            /* Cosmic Dark Mode Base */
            --bg-base: #050505;
            
            /* Glassmorphism 3.0 */
            --glass-bg: rgba(20, 20, 22, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(40px);
            --glass-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            
            /* Vibrant Accents */
            --accent-primary: #8B5CF6;   /* Purple */
            --accent-secondary: #EC4899; /* Pink */
            --accent-tertiary: #3B82F6;  /* Blue */
            
            /* Gradients */
            --gradient-button: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            --gradient-text: linear-gradient(135deg, #A78BFA, #F472B6);
            --gradient-active: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.05));
            --gradient-active-border: rgba(139, 92, 246, 0.5);

            /* Typography */
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --text-tertiary: #6B7280;
            
            /* Geometry */
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            
            /* Layout */
            --safe-area: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ─── Animated Mesh Gradient Background ─────────────────────── */
        .ambient-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: -1;
            background: var(--bg-base);
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: float 20s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }

        .orb-1 {
            width: 60vw; height: 60vw;
            background: rgba(139, 92, 246, 0.3);
            top: -10vw; left: -10vw;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 50vw; height: 50vw;
            background: rgba(236, 72, 153, 0.2);
            bottom: -10vw; right: -10vw;
            animation-delay: -5s;
        }
        
        .orb-3 {
            width: 40vw; height: 40vw;
            background: rgba(59, 130, 246, 0.25);
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 25s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 5%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* ─── Main Container ────────────────────────────────────────── */
        .studio-root {
            width: 100%;
            height: 100%;
            max-width: 1100px;
            max-height: 760px;
            display: grid;
            grid-template-columns: 400px 1fr;
            padding: 24px;
            gap: 24px;
            position: relative;
            z-index: 10;
            animation: appEntry 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes appEntry {
            from { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* ─── Premium Glass Card ─────────────────────────────────────── */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Subtle inner border for 3D effect */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.03);
            pointer-events: none;
        }

        /* ─── Left: High-Precision Display ─────────────────────────── */
        .display-panel {
            padding: 48px 32px 32px 32px;
            align-items: center;
            justify-content: space-between;
        }

        .header-brand {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }

        .header-brand h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: var(--text-primary);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }
        
        .header-brand h1 span {
            background: var(--gradient-text);
            -webkit-background-clip: text;
        }

        .header-brand p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .qr-viewport-wrapper {
            position: relative;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 36px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .qr-viewport {
            width: 260px;
            height: 260px;
            background: #ffffff;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1), box-shadow 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .qr-viewport:hover {
            transform: scale(1.02) translateY(-4px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 30px rgba(139, 92, 246, 0.3);
        }

        .qr-viewport:active { transform: scale(0.98); }

        .display-actions {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        /* ─── Ultimate Buttons ─────────────────────────────────────── */
        .btn {
            font-family: 'Outfit', sans-serif;
            border: none;
            height: 52px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--gradient-button);
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.2), inset 0 1px 1px rgba(255,255,255,0.3);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(236, 72, 153, 0.4), inset 0 1px 1px rgba(255,255,255,0.4);
            filter: brightness(1.1);
        }
        
        .btn-primary:hover::before { left: 150%; }
        .btn-primary:active { transform: translateY(1px); box-shadow: 0 5px 10px rgba(236, 72, 153, 0.2); }

        .btn-secondary {
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover { 
            background: rgba(255,255,255,0.08); 
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn-secondary:active { transform: translateY(0); }

        /* ─── Right: Customization Engine ─────────────────────────── */
        .controls-panel {
            display: flex;
            flex-direction: column;
            border-radius: var(--radius-xl);
        }

        .nav-tabs {
            display: flex;
            padding: 12px 16px;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--glass-border);
            position: relative;
            z-index: 20;
        }

        .nav-tabs button {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-tabs button:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }

        .nav-tabs button.active {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .nav-tabs button.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: var(--gradient-button);
            border-radius: 3px 3px 0 0;
            box-shadow: 0 -2px 10px rgba(236, 72, 153, 0.5);
        }

        .tab-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            scrollbar-width: thin;
        }

        .section { margin-bottom: 36px; }

        .section-label {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--glass-border), transparent);
        }

        /* ─── Form Controls & Inputs ────────────────────────────────────────── */
        .input-stack { display: flex; flex-direction: column; gap: 16px; }

        .input-group {
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            padding: 8px 16px 12px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .input-group:focus-within {
            background: rgba(255,255,255,0.03);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 1px var(--accent-primary), 0 10px 20px rgba(139, 92, 246, 0.1);
        }

        .input-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
            transition: color 0.3s;
        }

        .input-group:focus-within label { color: var(--accent-primary); }

        .input-group input, .input-group select, .input-group textarea {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 100%;
        }
        
        .input-group input::placeholder { color: #4B5563; }

        /* ─── Selectable Grids (Style Items) ───────────────────────── */
        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .style-item {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 20px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .style-item:hover {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .style-item.active {
            background: var(--gradient-active);
            border-color: var(--gradient-active-border);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.15), inset 0 0 0 1px var(--gradient-active-border);
            transform: translateY(-2px);
        }

        .style-item .icon {
            font-size: 24px;
            transition: transform 0.3s;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        
        .style-item.active .icon { transform: scale(1.1); }

        .style-item span {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        
        .style-item.active span { color: var(--text-primary); }

        /* ─── Color Palette ─────────────────────────────────────────── */
        .color-row { display: flex; gap: 16px; }

        .color-item {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }
        
        .color-item:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.2); }

        .color-item .color-picker-wrapper {
            width: 36px; height: 36px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
        }

        .color-item input[type="color"] {
            position: absolute;
            top: -10px; left: -10px;
            width: 56px; height: 56px; /* Oversized to hide default borders */
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .color-item span {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
        }

        /* ─── Branding Slider ───────────────────────────────────────── */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin-top: 12px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px; width: 20px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        /* ─── Footer Action ────────────────────────────────────────── */
        .bottom-bar {
            padding: 24px 32px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            z-index: 50;
        }

        /* ─── Toast Animation ───────────────────────────────────────── */
        #toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px) scale(0.9);
            background: rgba(15, 15, 20, 0.9);
            color: #fff;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 28px;
            border-radius: 40px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(139, 92, 246, 0.2);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
        }

        #toast.active { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }

        /* ─── Responsive & Height Optimization ───────────────────────── */
        @media (max-width: 820px) {
            .studio-root {
                grid-template-columns: 1fr;
                height: 100dvh;
                max-height: none;
                padding: 16px;
                display: flex;
                flex-direction: column;
                gap: 16px;
                overflow-y: auto;
                overflow-x: hidden;
            }

            .display-panel {
                padding: 32px 20px;
                gap: 24px;
                flex-shrink: 0;
            }

            .qr-viewport { width: 220px; height: 220px; }

            .controls-panel {
                flex: 1;
                min-height: 550px;
                margin-bottom: 80px; 
            }

            .nav-tabs { position: sticky; top: 0; z-index: 100; background: var(--glass-bg); backdrop-filter: var(--glass-blur); }

            .bottom-bar {
                position: fixed;
                bottom: 0; left: 0; right: 0;
                padding: 16px 24px calc(16px + var(--safe-area));
                background: rgba(10, 10, 12, 0.85);
                backdrop-filter: saturate(180%) blur(30px);
                -webkit-backdrop-filter: saturate(180%) blur(30px);
                z-index: 1000;
                border-top: 1px solid var(--glass-border);
            }
        }

        /* Scrollbar */
        .tab-scroll::-webkit-scrollbar { width: 6px; }
        .tab-scroll::-webkit-scrollbar-track { background: transparent; }
        .tab-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        .tab-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- Ambient Background -->
<div class="ambient-background">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
</div>

<div id="toast">✨ Action Completed</div>

<div class="studio-root">
    
    <!-- LEFT: DISPLAY -->
    <div class="glass-card display-panel">
        <div class="header-brand">
            <h1>QR Studio <span>Pro</span></h1>
            <p>Infinity Edition</p>
        </div>

        <div class="qr-viewport-wrapper">
            <div class="qr-viewport" id="qr-container">
                <!-- QR Canvas Injected Here -->
                <div id="placeholder-text" style="color: #000; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.2;">Preview Arena</div>
            </div>
        </div>

        <div class="display-actions">
            <button class="btn btn-secondary" id="btn-copy" onclick="copyPng()" style="width: 100%;">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy to Clipboard
            </button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button class="btn btn-secondary" id="btn-png" onclick="download('png')">Export PNG</button>
                <button class="btn btn-secondary" id="btn-svg" onclick="download('svg')">Export SVG</button>
            </div>
        </div>
    </div>

    <!-- RIGHT: ENGINE -->
    <div class="glass-card controls-panel">
        <div class="nav-tabs">
            <button id="t-content" class="active" onclick="setTab('content')">Content</button>
            <button id="t-style" onclick="setTab('style')">Style</button>
            <button id="t-brand" onclick="setTab('brand')">Branding</button>
        </div>

        <div class="tab-scroll">
            
            <!-- CONTENT TAB -->
            <div id="pane-content" class="tab-pane">
                <div class="section">
                    <span class="section-label">Payload Intelligence</span>
                    <div class="style-grid">
                        <div class="style-item active" id="type-url" onclick="setPayloadType('url')">
                            <span class="icon">🔗</span>
                            <span>URL / Text</span>
                        </div>
                        <div class="style-item" id="type-wifi" onclick="setPayloadType('wifi')">
                            <span class="icon">📶</span>
                            <span>WiFi</span>
                        </div>
                        <div class="style-item" id="type-vcard" onclick="setPayloadType('vcard')">
                            <span class="icon">📇</span>
                            <span>vCard</span>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <span class="section-label">Configuration Data</span>
                    <div id="dynamic-inputs" class="input-stack">
                        <!-- Inputs Injected Dynamically -->
                    </div>
                </div>
            </div>

            <!-- STYLE TAB -->
            <div id="pane-style" class="tab-pane hidden">
                <div class="section">
                    <span class="section-label">Aesthetic Pattern</span>
                    <div class="style-grid">
                        <div class="style-item active" id="dot-square" onclick="setDotType('square')">
                            <span class="icon">■</span><span>Square</span>
                        </div>
                        <div class="style-item" id="dot-extra-rounded" onclick="setDotType('extra-rounded')">
                            <span class="icon">●</span><span>Rounded</span>
                        </div>
                        <div class="style-item" id="dot-dots" onclick="setDotType('dots')">
                            <span class="icon">∷</span><span>Dots</span>
                        </div>
                        <div class="style-item" id="dot-classy" onclick="setDotType('classy')">
                            <span class="icon">◆</span><span>Classy</span>
                        </div>
                        <div class="style-item" id="dot-classy-rounded" onclick="setDotType('classy-rounded')">
                            <span class="icon">❃</span><span>Artistic</span>
                        </div>
                        <div class="style-item" id="dot-rounded" onclick="setDotType('rounded')">
                            <span class="icon">〰</span><span>Liquid</span>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <span class="section-label">Chromatic Palette</span>
                    <div class="input-stack">
                        <div class="color-row">
                            <div class="color-item">
                                <div class="color-picker-wrapper">
                                    <input type="color" id="c-dots" value="#000000" onchange="renderLive()">
                                </div>
                                <span>Foreground</span>
                            </div>
                            <div class="color-item">
                                <div class="color-picker-wrapper">
                                    <input type="color" id="c-bg" value="#ffffff" onchange="renderLive()">
                                </div>
                                <span>Background</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BRAND TAB -->
            <div id="pane-brand" class="tab-pane hidden">
                <div class="section">
                    <span class="section-label">Brand Identity</span>
                    <button class="btn btn-secondary" style="width: 100%; height: 80px; border: 2px dashed rgba(255,255,255,0.2);" onclick="document.getElementById('file-logo').click()">
                        <div>
                            <span style="display:block; font-size: 20px; margin-bottom: 4px;">⬆️</span>
                            Upload Logo (PNG/SVG)
                        </div>
                    </button>
                    <input type="file" id="file-logo" hidden accept="image/*" onchange="loadLogo(event)">
                    <p id="logo-meta" style="font-size: 13px; color: var(--accent-primary); margin-top: 12px; text-align: center; font-weight: 500;"></p>
                </div>

                <div class="section">
                    <span class="section-label">Logo Scale</span>
                    <div class="input-group">
                        <input type="range" id="logo-scale" min="0.1" max="0.45" step="0.05" value="0.3" oninput="renderLive()">
                    </div>
                </div>

                <button class="btn btn-secondary" style="width: 100%; color: #F87171; border-color: rgba(248, 113, 113, 0.2);" onclick="clearLogo()">
                    Remove Current Logo
                </button>
            </div>

        </div>

        <div class="bottom-bar">
            <button class="btn btn-primary" style="width: 100%;" onclick="generate()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Generate Master
            </button>
        </div>
    </div>

</div>

<script>
    // ─── Precision Engine State ─────────────────────────────────────
    let qr = null;
    let logoBase64 = null;
    let activeType = 'url';
    let activeDotType = 'square';
    let debounce = null;

    const inputModels = {
        url: [{ id: 'url', label: 'Website Address or Text', placeholder: 'Enter any link or message' }],
        wifi: [
            { id: 'ssid', label: 'Network Name (SSID)', placeholder: 'e.g. Guest Network' },
            { id: 'pass', label: 'Password', placeholder: 'Network Password' }
        ],
        vcard: [
            { id: 'vn', label: 'Full Name', placeholder: 'Jane Doe' },
            { id: 'vp', label: 'Phone Number', placeholder: '+1 (555) 000-0000' }
        ]
    };

    // ─── Lifecycle ──────────────────────────────────────────────────
    window.onload = () => {
        setPayloadType('url');
        setTimeout(generate, 500);
    };

    // ─── UI Controllers ─────────────────────────────────────────────
    function setTab(tab) {
        document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
        document.getElementById(`t-${tab}`).classList.add('active');
        document.getElementById(`pane-${tab}`).classList.remove('hidden');
    }

    function setPayloadType(type) {
        activeType = type;
        document.querySelectorAll('#pane-content .style-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`type-${type}`).classList.add('active');
        
        const container = document.getElementById('dynamic-inputs');
        container.innerHTML = inputModels[type].map(m => `
            <div class="input-group">
                <label>${m.label}</label>
                <input type="text" id="in-${m.id}" placeholder="${m.placeholder}" oninput="renderLive()">
            </div>
        `).join('');
    }

    function setDotType(type) {
        activeDotType = type;
        document.querySelectorAll('#pane-style .style-item').forEach(i => i.classList.remove('active'));
        const el = document.getElementById(`dot-${type}`);
        if(el) el.classList.add('active');
        renderLive();
    }

    // ─── Rendering Engine ───────────────────────────────────────────
    function renderLive() {
        clearTimeout(debounce);
        debounce = setTimeout(generate, 300);
    }

    function generate() {
        const data = getFinalData();
        if(!data) return;

        const fgColor = document.getElementById('c-dots').value;
        const bgColor = document.getElementById('c-bg').value;

        const options = {
            width: 300,
            height: 300,
            data: data,
            margin: 10,
            qrOptions: { errorCorrectionLevel: 'Q' },
            imageOptions: { hideBackgroundDots: true, imageSize: parseFloat(document.getElementById('logo-scale').value), margin: 5 },
            dotsOptions: { type: activeDotType, color: fgColor },
            cornersSquareOptions: { type: 'extra-rounded', color: fgColor },
            cornersDotOptions: { type: 'dot', color: fgColor },
            backgroundOptions: { color: bgColor },
            image: logoBase64
        };

        const container = document.getElementById('qr-container');
        container.innerHTML = '';
        qr = new QRCodeStyling(options);
        qr.append(container);

        const ph = document.getElementById('placeholder-text'); if(ph) ph.classList.add('hidden');
    }

    function getFinalData() {
        if(activeType === 'url') return document.getElementById('in-url').value || 'Hey there, my name is Sanket Dhengre';
        if(activeType === 'wifi') {
            const s = document.getElementById('in-ssid').value || 'Network';
            const p = document.getElementById('in-pass').value || 'Pass';
            return `WIFI:S:${s};T:WPA;P:${p};;`;
        }
        if(activeType === 'vcard') {
            const n = document.getElementById('in-vn').value || 'Name';
            const p = document.getElementById('in-vp').value || '000';
            return `BEGIN:VCARD\nVERSION:3.0\nN:${n}\nTEL:${p}\nEND:VCARD`;
        }
    }

    // ─── Branding Logic ──────────────────────────────────────────────
    function loadLogo(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            logoBase64 = ev.target.result;
            document.getElementById('logo-meta').innerText = "✓ Active: " + file.name;
            generate();
        };
        reader.readAsDataURL(file);
    }

    function clearLogo() {
        logoBase64 = null;
        document.getElementById('logo-meta').innerText = "";
        generate();
    }

    // ─── Productivity Actions ────────────────────────────────────────
    async function copyPng() {
        try {
            const blob = await qr.getRawData('png');
            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
            notify("✨ Copied to Clipboard");
        } catch { notify("⚠️ Clipboard Error"); }
    }

    function download(ext) {
        qr.download({ name: 'qr_infinity_export', extension: ext });
        notify(`🚀 Exported as ${ext.toUpperCase()}`);
    }

    function notify(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }
</script>
</body>
</html>
