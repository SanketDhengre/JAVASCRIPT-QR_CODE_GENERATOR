<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator Pro</title>
    <!-- Modern typography: Inter for UI, JetBrains Mono for inputs -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #000000;
            --bg-elevated: rgba(25, 25, 27, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(255, 255, 255, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #8a8f98;
            --accent-color: #ffffff;
            --glow-color: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 16px 16px 16px;
            position: relative;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(120, 119, 198, 0.15), transparent 40%),
                radial-gradient(circle at -20% 80%, rgba(255, 255, 255, 0.05), transparent 40%);
        }

        /* Animated Mesh / Space Glow */
        .ambient-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle at center, rgba(120, 119, 198, 0.1) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            filter: blur(60px);
            animation: breathe 10s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--bg-elevated);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8),
                        inset 0 1px 0 rgba(255,255,255,0.05);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #FFFFFF 0%, #A1A1AA 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
        }

        .qr-display-container {
            width: 100%;
            max-width: 250px;
            margin: 0 auto 32px auto;
            aspect-ratio: 1 / 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .qr-display-container.has-image {
            background: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        .qr-display-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.9) translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
        }

        .qr-display-container img.loaded {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .placeholder-content {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            transition: opacity 0.4s ease;
        }

        .placeholder-content svg {
            width: 32px;
            height: 32px;
            opacity: 0.4;
        }

        .placeholder-content span {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            padding: 16px 20px;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            appearance: none;
        }

        input[type="text"]:focus {
            border-color: rgba(120, 119, 198, 0.6);
            background: rgba(120, 119, 198, 0.05);
            box-shadow: 0 0 0 4px rgba(120, 119, 198, 0.15),
                        inset 0 0 0 1px rgba(120, 119, 198, 0.6);
            transform: translateY(-2px);
        }

        input[type="text"]::placeholder {
            color: rgba(138, 143, 152, 0.4);
        }

        select option {
            background: #111111;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        textarea {
            resize: none;
            height: 90px;
            line-height: 1.5;
        }

        textarea:focus, select:focus {
            border-color: var(--border-focus);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 1px var(--border-focus);
        }

        textarea::placeholder {
            color: rgba(138, 143, 152, 0.4);
        }

        .btn-generate {
            width: 100%;
            position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.03) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        /* Animated glowing border effect inside the button */
        .btn-generate::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(120, 119, 198, 0.2),
                        0 0 0 1px rgba(120, 119, 198, 0.3);
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }

        .btn-generate:hover::before {
            transform: translateX(100%);
        }

        .btn-generate:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(120, 119, 198, 0.1);
        }

        /* Loading Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top-color: var(--bg-base);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-generate.loading .spinner {
            display: block;
        }
        
        .btn-generate.loading span {
            display: none;
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .footer span {
            color: var(--text-primary);
        }

        /* Custom scrollbar for textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    
    <div class="container">
        <div class="header">
            <h1>QR Generator</h1>
            <p>Generate high-fidelity QR codes instantly.</p>
        </div>

        <div class="qr-display-container" id="qr-container">
            <div class="placeholder-content" id="placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <rect x="7" y="7" width="3" height="3"></rect>
                    <rect x="14" y="7" width="3" height="3"></rect>
                    <rect x="7" y="14" width="3" height="3"></rect>
                    <rect x="14" y="14" width="3" height="3"></rect>
                </svg>
                <span>Awaiting Data Input</span>
            </div>
            <img src="" id="img" alt="Generated QR Code">
        </div>

        <div class="input-group">
            <label for="qrtext">Payload Data</label>
            <input type="text" id="qrtext" placeholder="https://example.com" spellcheck="false" autocomplete="off">
        </div>



        <button class="btn-generate" id="generate-btn" onclick="genQR()">
            <span>Generate Code</span>
            <div class="spinner"></div>
        </button>

        <div class="footer">
            Engineered by <span>Sanket Dhengre</span>
        </div>
    </div>

    <script type="text/javascript">
        function genQR() {
            const imgElement = document.getElementById("img");
            const textInput = document.getElementById("qrtext").value.trim();
            const container = document.getElementById("qr-container");
            const placeholder = document.getElementById("placeholder");
            const btn = document.getElementById("generate-btn");

            if (!textInput) {
                // Shake animation for error state
                const inputGroup = document.getElementById("qrtext");
                inputGroup.style.transform = "translateX(-10px)";
                inputGroup.style.transition = "transform 0.1s";
                setTimeout(() => inputGroup.style.transform = "translateX(10px)", 100);
                setTimeout(() => inputGroup.style.transform = "translateX(-10px)", 200);
                setTimeout(() => inputGroup.style.transform = "translateX(0)", 300);
                inputGroup.focus();
                return;
            }

            // Enter loading state
            btn.classList.add("loading");
            imgElement.classList.remove("loaded");
            
            // Allow exit animation to play before fetching new structure
            setTimeout(() => {
                const apiURL = "https://quickchart.io/qr?text=";
                const finalSrc = apiURL + encodeURIComponent(textInput) + "&size=600&margin=1&dark=000000&light=ffffff";
                
                // Track image loading to orchestrate animations
                const newImg = new Image();
                newImg.onload = function() {
                    imgElement.src = finalSrc;
                    container.classList.add("has-image");
                    placeholder.style.opacity = "0";
                    
                    // Delay slightly to ensure browser has painted background change
                    setTimeout(() => {
                        imgElement.classList.add("loaded");
                        btn.classList.remove("loading");
                    }, 100);
                };
                newImg.src = finalSrc;
            }, 200);
        }

        // Handle Cmd/Ctrl + Enter as a generative shortcut
        document.getElementById("qrtext").addEventListener("keydown", function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
                e.preventDefault();
                genQR();
            }
        });
    </script>
</body>
</html>
