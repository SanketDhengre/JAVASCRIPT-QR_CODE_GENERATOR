<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Studio Pro — Designer Edition</title>
    <meta name="description" content="The world's most elegant QR code design studio. Apple-level aesthetics with high-fidelity control.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>

    <style>
        /* ─── Apple Design System ───────────────────────────────────── */
        :root {
            --bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --accent: #007aff;
            --accent-soft: rgba(0, 122, 255, 0.15);
            --glass: saturate(180%) blur(20px);
            --radius-lg: 20px;
            --radius-md: 12px;
            --safe-area: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 0% 0%, #1c1c1e 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, #1c1c1e 0%, transparent 40%);
        }

        /* ─── Main Container ────────────────────────────────────────── */
        .studio-root {
            width: 100%;
            height: 100%;
            max-width: 1024px;
            max-height: 720px;
            display: grid;
            grid-template-columns: 380px 1fr;
            padding: 24px;
            gap: 20px;
            animation: appEntry 1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        @keyframes appEntry {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ─── Shared Card Style ─────────────────────────────────────── */
        .apple-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── Left: High-Precision Display ─────────────────────────── */
        .display-panel {
            padding: 40px 32px;
            align-items: center;
            justify-content: space-between;
        }

        .header-brand {
            width: 100%;
            text-align: center;
        }

        .header-brand h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .header-brand p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .qr-viewport {
            width: 260px;
            height: 260px;
            background: #fff;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .qr-viewport:active { transform: scale(0.97); }

        .display-actions {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .primary-button {
            background: var(--text-primary);
            color: var(--bg);
            border: none;
            height: 48px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .primary-button:hover { opacity: 0.92; transform: translateY(-1px); }
        .primary-button:active { transform: translateY(0); }

        .secondary-button {
            background: rgba(255,255,255,0.06);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
            height: 48px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .secondary-button:hover { background: rgba(255,255,255,0.1); }

        /* ─── Right: Customization Engine ─────────────────────────── */
        .controls-panel {
            display: flex;
            flex-direction: column;
        }

        .nav-tabs {
            display: flex;
            padding: 8px;
            gap: 4px;
            border-bottom: 1px solid var(--card-border);
        }

        .nav-tabs button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-tabs button.active {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
        }

        .tab-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            scrollbar-width: thin;
        }

        .section {
            margin-bottom: 32px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            display: block;
        }

        /* ─── Form Controls ────────────────────────────────────────── */
        .input-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            background: rgba(255,255,255,0.05);
            border-radius: var(--radius-md);
            border: 1px solid var(--card-border);
            padding: 4px 16px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            padding-top: 8px;
        }

        .input-group input, .input-group select, .input-group textarea {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            padding: 8px 0 10px;
            font-family: inherit;
            outline: none;
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .style-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .style-item.active {
            background: var(--accent-soft);
            border-color: var(--accent);
        }

        .style-item .icon {
            font-size: 20px;
            margin-bottom: 8px;
            display: block;
        }

        .style-item span {
            font-size: 12px;
            font-weight: 600;
        }

        .color-row {
            display: flex;
            gap: 12px;
        }

        .color-item {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border-radius: var(--radius-md);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .color-item input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
        }

        .color-item span {
            font-size: 13px;
            font-weight: 500;
        }

        /* ─── Footer Action ────────────────────────────────────────── */
        .bottom-bar {
            padding: 16px 32px;
            border-top: 1px solid var(--card-border);
            background: rgba(255,255,255,0.02);
        }

        /* ─── Toast ───────────────────────────────────────────────────── */
        #toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255,255,255,0.95);
            color: #000;
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 9999;
        }

        #toast.active { transform: translateX(-50%) translateY(0); }

        /* ─── Responsive & Height Optimization ───────────────────────── */
        @media (max-width: 820px) {
            .studio-root {
                grid-template-columns: 1fr;
                height: 100dvh;
                max-height: none;
                padding: 16px;
                display: flex;
                flex-direction: column;
                gap: 16px;
                overflow-y: auto;
                overflow-x: hidden;
            }

            .display-panel {
                padding: 32px 20px;
                gap: 24px;
                flex-shrink: 0;
            }

            .qr-viewport {
                width: 220px;
                height: 220px;
            }

            .controls-panel {
                flex: 1;
                min-height: 500px;
                margin-bottom: 80px; /* Space for sticky button */
            }

            .nav-tabs {
                position: sticky;
                top: 0;
                z-index: 100;
                background: var(--card-bg);
            }

            .bottom-bar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 16px 24px calc(16px + var(--safe-area));
                background: rgba(20, 20, 22, 0.85);
                backdrop-filter: saturate(180%) blur(20px);
                -webkit-backdrop-filter: saturate(180%) blur(20px);
                z-index: 1000;
                border-top: 1px solid var(--card-border);
            }
        }

        /* Ruthless Scroll Removal for Desktops */
        @media (min-height: 700px) and (min-width: 821px) {
            body { overflow: hidden; }
        }

        .hidden { display: none !important; }

        /* Custom scrollbar for tab-scroll */
        .tab-scroll::-webkit-scrollbar { width: 4px; }
        .tab-scroll::-webkit-scrollbar-track { background: transparent; }
        .tab-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div id="toast">Copied to clipboard</div>

<div class="studio-root">
    
    <!-- LEFT: DISPLAY -->
    <div class="apple-card display-panel">
        <div class="header-brand">
            <h1>QR Studio</h1>
            <p>DESIGNER EDITION</p>
        </div>

        <div class="qr-viewport" id="qr-container">
            <!-- QR Canvas Injected Here -->
            <div id="placeholder-text" style="color: #000; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.2;">Preview Arena</div>
        </div>

        <div class="display-actions">
            <button class="secondary-button" id="btn-copy" onclick="copyPng()" disabled>
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy Image
            </button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="secondary-button" id="btn-png" onclick="download('png')" disabled>PNG</button>
                <button class="secondary-button" id="btn-svg" onclick="download('svg')" disabled>SVG</button>
            </div>
        </div>
    </div>

    <!-- RIGHT: ENGINE -->
    <div class="apple-card controls-panel">
        <div class="nav-tabs">
            <button id="t-content" class="active" onclick="setTab('content')">Content</button>
            <button id="t-style" onclick="setTab('style')">Style</button>
            <button id="t-brand" onclick="setTab('brand')">Branding</button>
        </div>

        <div class="tab-scroll">
            
            <!-- CONTENT TAB -->
            <div id="pane-content" class="tab-pane">
                <div class="section">
                    <span class="section-label">Payload Type</span>
                    <div class="style-grid">
                        <div class="style-item active" id="type-url" onclick="setPayloadType('url')">
                            <span class="icon">🔗</span>
                            <span>URL</span>
                        </div>
                        <div class="style-item" id="type-wifi" onclick="setPayloadType('wifi')">
                            <span class="icon">📶</span>
                            <span>WiFi</span>
                        </div>
                        <div class="style-item" id="type-vcard" onclick="setPayloadType('vcard')">
                            <span class="icon">📇</span>
                            <span>vCard</span>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <span class="section-label">Configuration</span>
                    <div id="dynamic-inputs" class="input-stack">
                        <!-- Inputs Injected Dynamically -->
                    </div>
                </div>
            </div>

            <!-- STYLE TAB -->
            <div id="pane-style" class="tab-pane hidden">
                <div class="section">
                    <span class="section-label">Dot Pattern</span>
                    <div class="style-grid">
                        <div class="style-item active" id="dot-square" onclick="setDotType('square')">
                            <span class="icon">■</span><span>Square</span>
                        </div>
                        <div class="style-item" id="dot-extra-rounded" onclick="setDotType('extra-rounded')">
                            <span class="icon">●</span><span>Rounded</span>
                        </div>
                        <div class="style-item" id="dot-dots" onclick="setDotType('dots')">
                            <span class="icon">::</span><span>Dots</span>
                        </div>
                        <div class="style-item" id="dot-classy" onclick="setDotType('classy')">
                            <span class="icon">◆</span><span>Classy</span>
                        </div>
                        <div class="style-item" id="dot-classy-rounded" onclick="setDotType('classy-rounded')">
                            <span class="icon">❃</span><span>Artistic</span>
                        </div>
                        <div class="style-item" id="dot-rounded" onclick="setDotType('rounded')">
                            <span class="icon">〰</span><span>Liquid</span>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <span class="section-label">Color Palette</span>
                    <div class="input-stack">
                        <div class="color-row">
                            <div class="color-item">
                                <input type="color" id="c-dots" value="#000000" onchange="renderLive()">
                                <span>Dots</span>
                            </div>
                            <div class="color-item">
                                <input type="color" id="c-bg" value="#ffffff" onchange="renderLive()">
                                <span>Back</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BRAND TAB -->
            <div id="pane-brand" class="tab-pane hidden">
                <div class="section">
                    <span class="section-label">Logo Overlay</span>
                    <button class="secondary-button" style="width: 100%;" onclick="document.getElementById('file-logo').click()">
                        Choose Brand Icon
                    </button>
                    <input type="file" id="file-logo" hidden accept="image/*" onchange="loadLogo(event)">
                    <p id="logo-meta" style="font-size: 11px; color: var(--text-secondary); margin-top: 10px; text-align: center;">Recommended: Square PNG/SVG</p>
                </div>

                <div class="section">
                    <span class="section-label">Logo Dynamics</span>
                    <div class="input-group">
                        <label>Size Multiplier</label>
                        <input type="range" id="logo-scale" min="0.1" max="0.45" step="0.05" value="0.3" oninput="renderLive()">
                    </div>
                </div>

                <button class="secondary-button" style="width: 100%; color: #ff3b30;" onclick="clearLogo()">Remove Logo</button>
            </div>

        </div>

        <div class="bottom-bar">
            <button class="primary-button" style="width: 100%;" onclick="generate()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                Generate Final
            </button>
        </div>
    </div>

</div>

<script>
    // ─── Precision Engine State ─────────────────────────────────────
    let qr = null;
    let logoBase64 = null;
    let activeType = 'url';
    let activeDotType = 'square';
    let debounce = null;

    const inputModels = {
        url: [{ id: 'url', label: 'website address or text', placeholder: 'website address or text' }],
        wifi: [
            { id: 'ssid', label: 'Network Name', placeholder: 'WiFi SSID' },
            { id: 'pass', label: 'Password', placeholder: 'WPA2 Password' }
        ],
        vcard: [
            { id: 'vn', label: 'Name', placeholder: 'John Apple' },
            { id: 'vp', label: 'Phone', placeholder: '+1 555 1234' }
        ]
    };

    // ─── Lifecycle ──────────────────────────────────────────────────
    window.onload = () => {
        setPayloadType('url');
        // Initial silent generate if any data exists
        setTimeout(generate, 500);
    };

    // ─── UI Controllers ─────────────────────────────────────────────
    function setTab(tab) {
        document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
        document.getElementById(`t-${tab}`).classList.add('active');
        document.getElementById(`pane-${tab}`).classList.remove('hidden');
    }

    function setPayloadType(type) {
        activeType = type;
        document.querySelectorAll('#pane-content .style-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`type-${type}`).classList.add('active');
        
        const container = document.getElementById('dynamic-inputs');
        container.innerHTML = inputModels[type].map(m => `
            <div class="input-group">
                <label>${m.label}</label>
                <input type="text" id="in-${m.id}" placeholder="${m.placeholder}" oninput="renderLive()">
            </div>
        `).join('');
    }

    function setDotType(type) {
        activeDotType = type;
        document.querySelectorAll('#pane-style .style-item').forEach(i => i.classList.remove('active'));
        const el = document.getElementById(`dot-${type}`);
        if(el) el.classList.add('active');
        renderLive();
    }

    // ─── Rendering Engine ───────────────────────────────────────────
    function renderLive() {
        clearTimeout(debounce);
        debounce = setTimeout(generate, 300);
    }

    function generate() {
        const data = getFinalData();
        if(!data) return;

        const options = {
            width: 260,
            height: 260,
            data: data,
            margin: 10,
            qrOptions: { errorCorrectionLevel: 'Q' },
            imageOptions: { hideBackgroundDots: true, imageSize: parseFloat(document.getElementById('logo-scale').value), margin: 5 },
            dotsOptions: { type: activeDotType, color: document.getElementById('c-dots').value },
            backgroundOptions: { color: document.getElementById('c-bg').value },
            image: logoBase64
        };

        const container = document.getElementById('qr-container');
        container.innerHTML = '';
        qr = new QRCodeStyling(options);
        qr.append(container);

        // UI state toggle
        const bCopy = document.getElementById('btn-copy'); if(bCopy) bCopy.disabled = false;
        const bPng = document.getElementById('btn-png'); if(bPng) bPng.disabled = false;
        const bSvg = document.getElementById('btn-svg'); if(bSvg) bSvg.disabled = false;
        const ph = document.getElementById('placeholder-text'); if(ph) ph.classList.add('hidden');
    }

    function getFinalData() {
        if(activeType === 'url') return document.getElementById('in-url').value || 'Hey there, my name is Sanket Dhengre';
        if(activeType === 'wifi') {
            const s = document.getElementById('in-ssid').value || 'Network';
            const p = document.getElementById('in-pass').value || 'Pass';
            return `WIFI:S:${s};T:WPA;P:${p};;`;
        }
        if(activeType === 'vcard') {
            const n = document.getElementById('in-vn').value || 'Name';
            const p = document.getElementById('in-vp').value || '000';
            return `BEGIN:VCARD\nVERSION:3.0\nN:${n}\nTEL:${p}\nEND:VCARD`;
        }
    }

    // ─── Branding Logic ──────────────────────────────────────────────
    function loadLogo(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            logoBase64 = ev.target.result;
            document.getElementById('logo-meta').innerText = "Logo: " + file.name;
            generate();
        };
        reader.readAsDataURL(file);
    }

    function clearLogo() {
        logoBase64 = null;
        document.getElementById('logo-meta').innerText = "Recommended: Square PNG/SVG";
        generate();
    }

    // ─── Productivity Actions ────────────────────────────────────────
    async function copyPng() {
        try {
            const blob = await qr.getRawData('png');
            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
            notify("Copied to clipboard");
        } catch { notify("Clipboard Error"); }
    }

    function download(ext) {
        qr.download({ name: 'qr_designer', extension: ext });
        notify("Saved as " + ext.toUpperCase());
    }

    function notify(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 2500);
    }
</script>
</body>
</html>
