<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Studio — Code Generator Pro</title>
    <meta name="description" content="Generate beautiful, styled QR codes instantly. Multiple styles, color themes, and download support.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>

    <style>
        /* ─── Design Tokens ─────────────────────────────────────────── */
        :root {
            --bg:            #060608;
            --surface:       rgba(18, 18, 22, 0.75);
            --surface-hover: rgba(30, 30, 38, 0.8);
            --border:        rgba(255,255,255,0.06);
            --border-strong: rgba(255,255,255,0.12);
            --text:          #f1f1f3;
            --text-muted:    #6b6b7a;
            --accent:        #8b5cf6;
            --accent-dim:    rgba(139,92,246,0.18);
            --accent-glow:   rgba(139,92,246,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        
        html, body { height: 100%; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            position: relative;
            overflow: hidden;
        }

        /* ─── Multi-color ambient background ───────────────────────── */
        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .ambient span {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            animation: drift 20s ease-in-out infinite alternate;
        }
        .ambient span:nth-child(1) {
            width: 500px; height: 500px;
            background: rgba(139,92,246,0.10);
            top: -100px; left: -100px;
        }
        .ambient span:nth-child(2) {
            width: 400px; height: 400px;
            background: rgba(59,130,246,0.08);
            bottom: -80px; right: -80px;
            animation-delay: -7s;
        }
        .ambient span:nth-child(3) {
            width: 300px; height: 300px;
            background: rgba(236,72,153,0.06);
            top: 40%; left: 40%;
            animation-delay: -14s;
        }
        @keyframes drift {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.15); }
        }

        /* ─── Top Nav Bar ────────────────────────────────────────────── */
        .nav {
            position: relative; z-index: 2;
            width: 100%; max-width: 760px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 8px;
        }
        .nav-brand .icon-wrap {
            width: 28px; height: 28px;
            background: var(--accent-dim);
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-brand .icon-wrap svg { width: 14px; height: 14px; color: #a78bfa; }
        .nav-brand span {
            font-size: 14px; font-weight: 600; letter-spacing: -0.02em;
        }
        .nav-brand small {
            font-size: 11px; color: var(--text-muted); font-weight: 400;
        }
        .nav-badge {
            font-size: 10px; font-weight: 600; color: #a78bfa; letter-spacing: 0.08em;
            background: var(--accent-dim); border: 1px solid rgba(139,92,246,0.25);
            border-radius: 999px; padding: 3px 10px; text-transform: uppercase;
        }

        /* ─── Main Card  ─────────────────────────────────────────────── */
        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 760px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.025) inset,
                0 40px 100px -20px rgba(0,0,0,0.9),
                0 0 100px -30px rgba(139,92,246,0.1);
            display: grid;
            grid-template-columns: 280px 1fr;
            animation: cardIn 0.85s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* ─── Left: Preview Panel ────────────────────────────────────── */
        .panel-preview {
            border-right: 1px solid var(--border);
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .qr-frame {
            width: 220px; height: 220px;
            border-radius: 18px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .qr-frame.lit {
            background: #fff;
            border-color: rgba(255,255,255,0.25);
            box-shadow: 0 0 60px rgba(255,255,255,0.06), 0 0 130px rgba(139,92,246,0.07);
        }

        /* Scan-line animation overlaid on the QR */
        .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(139,92,246,0.8), transparent);
            top: 0;
            animation: scan 2s linear infinite;
            display: none;
        }
        .qr-frame.scanning .scan-line { display: block; }
        @keyframes scan {
            0%   { top: 0%;   opacity: 0.8; }
            50%  { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        #qr-canvas {
            opacity: 0;
            transform: scale(0.88);
            transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.16,1,0.3,1);
        }
        #qr-canvas.show { opacity: 1; transform: scale(1); }

        .placeholder {
            position: absolute;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            transition: opacity 0.4s ease;
        }
        .placeholder svg { width: 40px; height: 40px; color: var(--text-muted); opacity: 0.25; }
        .placeholder p {
            font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px;
            text-transform: uppercase; font-weight: 500;
        }

        /* Action buttons below QR */
        .preview-actions { display: flex; gap: 8px; width: 100%; }
        .action-btn {
            flex: 1;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            background: rgba(255,255,255,0.035);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 12px; font-weight: 500;
            padding: 10px 8px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .action-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
        .action-btn:hover {
            background: var(--surface-hover);
            border-color: var(--border-strong);
            color: var(--text);
        }
        .action-btn:disabled { opacity: 0.3; cursor: default; }
        .action-btn:disabled:hover { background: rgba(255,255,255,0.035); border-color: var(--border); color: var(--text-muted); }

        /* ─── Right: Controls Panel ───────────────────────────────────── */
        .panel-controls { padding: 28px; display: flex; flex-direction: column; gap: 22px; }

        .section-title {
            font-size: 10.5px; font-weight: 600;
            color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* Style grid: 3 cols × 2 rows */
        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .style-tile {
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 6px 8px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            cursor: pointer;
            font-size: 11px; font-weight: 500;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            transition: all 0.22s cubic-bezier(0.16,1,0.3,1);
            user-select: none;
        }
        .style-tile:hover {
            background: var(--accent-dim);
            border-color: rgba(139,92,246,0.3);
            color: #c4b5fd;
            transform: translateY(-2px);
        }
        .style-tile.active {
            background: var(--accent-dim);
            border-color: rgba(139,92,246,0.55);
            color: #c4b5fd;
            box-shadow: 0 0 20px rgba(139,92,246,0.15);
        }
        .style-tile .thumb { width: 38px; height: 38px; border-radius: 6px; overflow: hidden; }
        .style-tile .thumb svg { width: 100%; height: 100%; }

        /* Color swatches */
        .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .color-swatch {
            width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            position: relative;
        }
        .color-swatch::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: border-color 0.2s ease;
        }
        .color-swatch.active::after { border-color: rgba(255,255,255,0.5); }
        .color-swatch:hover { transform: scale(1.15); }

        /* Input */
        label.field-label {
            display: block;
            font-size: 10.5px; font-weight: 600;
            color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
            margin-bottom: 8px;
        }
        .input-wrap { position: relative; }
        .input-wrap svg.input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            width: 14px; height: 14px; color: var(--text-muted); pointer-events: none;
        }
        input#payload {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 13px 14px 13px 38px;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        input#payload:focus {
            border-color: rgba(139,92,246,0.55);
            background: rgba(139,92,246,0.04);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.18);
        }
        input#payload::placeholder { color: rgba(107,107,122,0.5); }

        /* Generate */
        .btn-gen {
            width: 100%;
            position: relative; overflow: hidden;
            background: linear-gradient(140deg, rgba(139,92,246,0.22), rgba(59,130,246,0.18));
            border: 1px solid rgba(139,92,246,0.35);
            color: #ddd6fe;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px; font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-gen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-200%);
            transition: transform 0.7s ease;
        }
        .btn-gen:hover {
            transform: translateY(-2px);
            border-color: rgba(139,92,246,0.7);
            background: linear-gradient(140deg, rgba(139,92,246,0.35), rgba(59,130,246,0.28));
            box-shadow: 0 8px 30px rgba(139,92,246,0.25);
            color: #fff;
        }
        .btn-gen:hover::after { transform: translateX(200%); }
        .btn-gen:active { transform: translateY(1px); }
        .btn-gen.loading > .btn-label { display: none; }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(200,180,255,0.2);
            border-top-color: #ddd6fe;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            display: none;
        }
        .btn-gen.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Toast ───────────────────────────────────────────────────── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(30,30,38,0.95);
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            padding: 11px 18px;
            font-size: 13px; color: var(--text);
            backdrop-filter: blur(20px);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 99;
            display: flex; align-items: center; gap: 8px;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast svg { width: 16px; height: 16px; color: #a78bfa; }

        /* ─── Footer ──────────────────────────────────────────────────── */
        .footer {
            position: relative; z-index: 1;
            margin-top: 16px;
            font-size: 11px; color: var(--text-muted);
            text-align: center;
        }
        .footer span { color: var(--text); }

        /* ─── Responsive ──────────────────────────────────────────────── */
        @media (max-width: 620px) {
            .card { grid-template-columns: 1fr; max-width: 380px; }
            .panel-preview { border-right: none; border-bottom: 1px solid var(--border); }
            .nav { max-width: 380px; }
        }
    </style>
</head>
<body>

<!-- Ambient orbs -->
<div class="ambient"><span></span><span></span><span></span></div>

<!-- Nav -->
<nav class="nav">
    <div class="nav-brand">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/><circle cx="17.5" cy="17.5" r="2.5"/>
            </svg>
        </div>
        <div>
            <span>QR Studio</span><br>
            <small>by Sanket Dhengre</small>
        </div>
    </div>
    <span class="nav-badge">Pro</span>
</nav>

<!-- Main Card -->
<div class="card">

    <!-- LEFT: Preview -->
    <div class="panel-preview">
        <div class="qr-frame" id="qr-frame">
            <div class="scan-line" id="scan-line"></div>
            <div class="placeholder" id="placeholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
                    <rect x="2" y="2" width="9" height="9" rx="1.5"/>
                    <rect x="13" y="2" width="9" height="9" rx="1.5"/>
                    <rect x="2" y="13" width="9" height="9" rx="1.5"/>
                    <rect x="5" y="5" width="3" height="3"/>
                    <rect x="16" y="5" width="3" height="3"/>
                    <rect x="5" y="16" width="3" height="3"/>
                    <path d="M13 13h2v2h-2zM17 13h4M17 17h4M13 17v4M13 21h4"/>
                </svg>
                <p>Awaiting Input</p>
            </div>
            <div id="qr-canvas"></div>
        </div>

        <div class="preview-actions">
            <button class="action-btn" id="copy-btn" onclick="copyQR()" disabled title="Copy to clipboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                Copy
            </button>
            <button class="action-btn" id="download-btn" onclick="downloadQR()" disabled title="Download PNG">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download
            </button>
        </div>
    </div>

    <!-- RIGHT: Controls -->
    <div class="panel-controls">

        <!-- Style Presets -->
        <div>
            <p class="section-title">Style</p>
            <div class="style-grid">
                <button class="style-tile active" data-style="classic" onclick="selectStyle(this)">
                    <div class="thumb">
                        <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="38" height="38" fill="white"/>
                        <rect x="4" y="4" width="11" height="11" fill="#111"/><rect x="23" y="4" width="11" height="11" fill="#111"/><rect x="4" y="23" width="11" height="11" fill="#111"/>
                        <rect x="6" y="6" width="7" height="7" fill="white"/><rect x="25" y="6" width="7" height="7" fill="white"/><rect x="6" y="25" width="7" height="7" fill="white"/>
                        <rect x="23" y="23" width="3" height="3" fill="#111"/><rect x="28" y="23" width="3" height="3" fill="#111"/>
                        <rect x="23" y="28" width="3" height="3" fill="#111"/><rect x="28" y="28" width="3" height="3" fill="#111"/>
                        <rect x="17" y="4" width="3" height="3" fill="#111"/><rect x="17" y="8" width="3" height="3" fill="#111"/>
                        <rect x="17" y="23" width="3" height="3" fill="#111"/><rect x="4" y="17" width="3" height="3" fill="#111"/>
                        </svg>
                    </div>
                    Classic
                </button>
                <button class="style-tile" data-style="rounded" onclick="selectStyle(this)">
                    <div class="thumb">
                        <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="38" height="38" fill="white"/>
                        <rect x="4" y="4" width="11" height="11" rx="3.5" fill="#111"/><rect x="23" y="4" width="11" height="11" rx="3.5" fill="#111"/><rect x="4" y="23" width="11" height="11" rx="3.5" fill="#111"/>
                        <rect x="6" y="6" width="7" height="7" rx="2" fill="white"/><rect x="25" y="6" width="7" height="7" rx="2" fill="white"/><rect x="6" y="25" width="7" height="7" rx="2" fill="white"/>
                        <circle cx="24.5" cy="24.5" r="1.8" fill="#111"/><circle cx="29.5" cy="24.5" r="1.8" fill="#111"/>
                        <circle cx="24.5" cy="29.5" r="1.8" fill="#111"/><circle cx="29.5" cy="29.5" r="1.8" fill="#111"/>
                        </svg>
                    </div>
                    Rounded
                </button>
                <button class="style-tile" data-style="dots" onclick="selectStyle(this)">
                    <div class="thumb">
                        <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="38" height="38" fill="white"/>
                        <circle cx="8" cy="8" r="2.5" fill="#111"/><circle cx="14" cy="8" r="2.5" fill="#111"/>
                        <circle cx="20" cy="8" r="2.5" fill="#111"/><circle cx="26" cy="8" r="2.5" fill="#111"/>
                        <circle cx="32" cy="8" r="2.5" fill="#111"/><circle cx="8" cy="14" r="2.5" fill="#111"/>
                        <circle cx="32" cy="14" r="2.5" fill="#111"/><circle cx="8" cy="20" r="2.5" fill="#111"/>
                        <circle cx="14" cy="20" r="2.5" fill="#111"/><circle cx="20" cy="20" r="2.5" fill="#111"/>
                        <circle cx="32" cy="20" r="2.5" fill="#111"/><circle cx="8" cy="26" r="2.5" fill="#111"/>
                        <circle cx="20" cy="26" r="2.5" fill="#111"/><circle cx="32" cy="26" r="2.5" fill="#111"/>
                        <circle cx="8" cy="32" r="2.5" fill="#111"/><circle cx="14" cy="32" r="2.5" fill="#111"/>
                        <circle cx="26" cy="32" r="2.5" fill="#111"/><circle cx="32" cy="32" r="2.5" fill="#111"/>
                        </svg>
                    </div>
                    Dots
                </button>
                <button class="style-tile" data-style="gradient" onclick="selectStyle(this)">
                    <div class="thumb">
                        <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="38" height="38" fill="white"/>
                        <defs><linearGradient id="gA" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse"><stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs>
                        <rect x="4" y="4" width="11" height="11" rx="3.5" fill="url(#gA)"/><rect x="23" y="4" width="11" height="11" rx="3.5" fill="url(#gA)"/><rect x="4" y="23" width="11" height="11" rx="3.5" fill="url(#gA)"/>
                        <rect x="6" y="6" width="7" height="7" rx="2" fill="white"/><rect x="25" y="6" width="7" height="7" rx="2" fill="white"/><rect x="6" y="25" width="7" height="7" rx="2" fill="white"/>
                        <circle cx="24.5" cy="24.5" r="1.8" fill="url(#gA)"/><circle cx="29.5" cy="24.5" r="1.8" fill="url(#gA)"/>
                        <circle cx="24.5" cy="29.5" r="1.8" fill="url(#gA)"/><circle cx="29.5" cy="29.5" r="1.8" fill="url(#gA)"/>
                        </svg>
                    </div>
                    Gradient
                </button>
                <button class="style-tile" data-style="classy" onclick="selectStyle(this)">
                    <div class="thumb">
                        <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="38" height="38" fill="white"/>
                        <rect x="4" y="4" width="11" height="11" rx="5" fill="#111"/><rect x="23" y="4" width="11" height="11" rx="5" fill="#111"/><rect x="4" y="23" width="11" height="11" rx="5" fill="#111"/>
                        <circle cx="9.5" cy="9.5" r="3.5" fill="white"/><circle cx="28.5" cy="9.5" r="3.5" fill="white"/><circle cx="9.5" cy="28.5" r="3.5" fill="white"/>
                        <rect x="23" y="23" width="4" height="4" rx="2" fill="#111"/><rect x="29" y="23" width="4" height="4" rx="2" fill="#111"/>
                        <rect x="23" y="29" width="4" height="4" rx="2" fill="#111"/><rect x="29" y="29" width="4" height="4" rx="2" fill="#111"/>
                        </svg>
                    </div>
                    Classy
                </button>
                <button class="style-tile" data-style="dark" onclick="selectStyle(this)">
                    <div class="thumb">
                        <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="38" height="38" fill="#111"/>
                        <rect x="4" y="4" width="11" height="11" rx="3.5" fill="white"/><rect x="23" y="4" width="11" height="11" rx="3.5" fill="white"/><rect x="4" y="23" width="11" height="11" rx="3.5" fill="white"/>
                        <rect x="6" y="6" width="7" height="7" rx="2" fill="#111"/><rect x="25" y="6" width="7" height="7" rx="2" fill="#111"/><rect x="6" y="25" width="7" height="7" rx="2" fill="#111"/>
                        <circle cx="24.5" cy="24.5" r="1.8" fill="white"/><circle cx="29.5" cy="24.5" r="1.8" fill="white"/>
                        <circle cx="24.5" cy="29.5" r="1.8" fill="white"/><circle cx="29.5" cy="29.5" r="1.8" fill="white"/>
                        </svg>
                    </div>
                    Dark
                </button>
            </div>
        </div>

        <!-- Color -->
        <div>
            <p class="section-title">Color</p>
            <div class="color-row" id="color-row">
                <div class="color-swatch active" data-color="#111111" style="background:#111111;" onclick="selectColor(this)" title="Obsidian"></div>
                <div class="color-swatch" data-color="#7c3aed" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);" onclick="selectColor(this)" title="Violet"></div>
                <div class="color-swatch" data-color="#0284c7" style="background:linear-gradient(135deg,#38bdf8,#0284c7);" onclick="selectColor(this)" title="Electric"></div>
                <div class="color-swatch" data-color="#be123c" style="background:linear-gradient(135deg,#fb7185,#be123c);" onclick="selectColor(this)" title="Rose"></div>
                <div class="color-swatch" data-color="#047857" style="background:linear-gradient(135deg,#34d399,#047857);" onclick="selectColor(this)" title="Emerald"></div>
                <div class="color-swatch" data-color="#b45309" style="background:linear-gradient(135deg,#fbbf24,#b45309);" onclick="selectColor(this)" title="Amber"></div>
            </div>
        </div>

        <!-- Input -->
        <div>
            <label class="field-label" for="payload">Payload</label>
            <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
                <input type="text" id="payload" placeholder="https://example.com" spellcheck="false" autocomplete="off">
            </div>
        </div>

        <!-- Generate -->
        <button class="btn-gen" id="gen-btn" onclick="generate()">
            <span class="btn-label">
                <svg style="width:15px;height:15px;vertical-align:middle;margin-right:6px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
                Generate Code
            </span>
            <div class="spinner"></div>
        </button>

    </div>
</div>

<!-- Footer -->
<p class="footer">Engineered by <span>Sanket Dhengre</span> · QR Studio Pro</p>

<!-- Toast -->
<div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toast-msg"></span>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let currentStyle = 'classic';
let currentColor = '#111111';
let qrInstance   = null;
let debounceTimer = null;

// ─── Style Config Factory ─────────────────────────────────────────────────────
function getConfig(style, color, data) {
    const base = { data, width: 206, height: 206, margin: 10, qrOptions: { errorCorrectionLevel: 'H' } };

    const PURPLE_GRAD = {
        type: 'linear', rotation: Math.PI / 4,
        colorStops: [{ offset: 0, color: '#8b5cf6' }, { offset: 1, color: '#3b82f6' }]
    };

    const configs = {
        classic: {
            dotsOptions:          { type: 'square',        color },
            cornersSquareOptions: { type: 'square',        color },
            cornersDotOptions:    { type: 'square',        color },
            backgroundOptions:    { color: '#ffffff' }
        },
        rounded: {
            dotsOptions:          { type: 'extra-rounded', color },
            cornersSquareOptions: { type: 'extra-rounded', color },
            cornersDotOptions:    { type: 'dot',           color },
            backgroundOptions:    { color: '#ffffff' }
        },
        dots: {
            dotsOptions:          { type: 'dots',          color },
            cornersSquareOptions: { type: 'dot',           color },
            cornersDotOptions:    { type: 'dot',           color },
            backgroundOptions:    { color: '#ffffff' }
        },
        gradient: {
            dotsOptions:          { type: 'rounded',       gradient: PURPLE_GRAD },
            cornersSquareOptions: { type: 'extra-rounded', gradient: PURPLE_GRAD },
            cornersDotOptions:    { type: 'dot',           color: '#8b5cf6' },
            backgroundOptions:    { color: '#ffffff' }
        },
        classy: {
            dotsOptions:          { type: 'classy',        color },
            cornersSquareOptions: { type: 'extra-rounded', color },
            cornersDotOptions:    { type: 'dot',           color },
            backgroundOptions:    { color: '#ffffff' }
        },
        dark: {
            dotsOptions:          { type: 'extra-rounded', color: '#f1f1f3' },
            cornersSquareOptions: { type: 'extra-rounded', color: '#f1f1f3' },
            cornersDotOptions:    { type: 'dot',           color: '#f1f1f3' },
            backgroundOptions:    { color: '#0d0d10' }
        }
    };

    return { ...base, ...(configs[style] || configs.classic) };
}

// ─── Generate ─────────────────────────────────────────────────────────────────
function generate() {
    const text   = document.getElementById('payload').value.trim();
    const btn    = document.getElementById('gen-btn');
    const input  = document.getElementById('payload');
    const frame  = document.getElementById('qr-frame');
    const canvas = document.getElementById('qr-canvas');
    const ph     = document.getElementById('placeholder');
    const scanLine = document.getElementById('scan-line');

    if (!text) {
        input.style.transition = 'transform 0.08s';
        ['−12px','12px','−8px','8px','0'].forEach((v, i) =>
            setTimeout(() => input.style.transform = `translateX(${v})`, i * 70)
        );
        input.focus();
        return;
    }

    btn.classList.add('loading');
    canvas.classList.remove('show');

    // Trigger scan animation
    frame.classList.add('scanning');

    setTimeout(() => {
        canvas.innerHTML = '';

        qrInstance = new QRCodeStyling(getConfig(currentStyle, currentColor, text));
        qrInstance.append(canvas);

        setTimeout(() => {
            frame.classList.add('lit');
            frame.classList.remove('scanning');
            ph.style.opacity = '0';
            canvas.classList.add('show');
            btn.classList.remove('loading');

            // Enable action buttons
            document.getElementById('copy-btn').disabled = false;
            document.getElementById('download-btn').disabled = false;
        }, 280);
    }, 300);
}

// ─── Style Selector ───────────────────────────────────────────────────────────
function selectStyle(el) {
    document.querySelectorAll('.style-tile').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentStyle = el.dataset.style;
}

// ─── Color Selector ───────────────────────────────────────────────────────────
function selectColor(el) {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    currentColor = el.dataset.color;
}

// ─── Download ─────────────────────────────────────────────────────────────────
function downloadQR() {
    if (!qrInstance) return;
    qrInstance.download({ name: 'qr-studio-code', extension: 'png' });
    showToast('QR code downloaded!');
}

// ─── Copy ─────────────────────────────────────────────────────────────────────
async function copyQR() {
    if (!qrInstance) return;
    try {
        const blob = await qrInstance.getRawData('png');
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        showToast('Copied to clipboard!');
    } catch {
        showToast('Copy not supported — try Download instead.');
    }
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── Live Preview (debounced) ─────────────────────────────────────────────────
document.getElementById('payload').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        if (document.getElementById('payload').value.trim()) generate();
    }, 600);
});

// ─── Keyboard shortcut ────────────────────────────────────────────────────────
document.getElementById('payload').addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); generate(); }
});
</script>
</body>
</html>
